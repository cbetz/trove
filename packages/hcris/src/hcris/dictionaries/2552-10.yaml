# Semantic field dictionary for CMS Medicare Cost Report Hospital form 2552-10.
#
# Maps (wksht_cd, line_num, clmn_num) tuples to human-readable variable names
# so that downstream code can work with `total_beds` instead of `(S300001, 1400, 200)`.
#
# Factual codes (wksht_cd, line_num, clmn_num) are drawn from CMS Provider
# Reimbursement Manual Chapter 40 and the published 2552-10 worksheet templates —
# public-domain US government work. Variable names and descriptions are trove's
# own authorship. The Sacarny `hospital-cost-reports` repository was consulted
# as a cross-reference for coverage; this file is an independent authoring.
#
# Values for line_num and clmn_num are integers here for readability. The loader
# zero-pads them to the 5-character strings that CMS actually emits in NMRC/ALPHA
# (e.g. 200 -> "00200"). Alpha-suffixed column codes like "04A00" stay as strings.

schema_version: 1
form: "2552-10"

variables:
  # --- Identity and organization (Worksheet S-2 Part I) ---

  - name: hospital_name
    source: alpha
    type: string
    wksht_cd: S200001
    line_num: 300
    clmn_num: 100
    description: Legal name of the hospital.

  - name: ownership_type
    source: alpha
    type: string
    wksht_cd: S200001
    line_num: 2100
    clmn_num: 100
    description: Type of ownership/control (e.g. voluntary nonprofit, for-profit, government).

  - name: chain_name
    source: alpha
    type: string
    wksht_cd: S200001
    line_num: 14100
    clmn_num: 100
    description: Name of the parent chain organization, if the hospital is part of one.

  # --- Bed capacity and utilization (Worksheet S-3 Part I) ---

  - name: total_beds
    source: nmrc
    type: int
    wksht_cd: S300001
    line_num: 1400
    clmn_num: 200
    description: Total beds including swing beds and special-care units (ICU, CCU, NICU, etc.).

  - name: total_beds_grand
    source: nmrc
    type: int
    wksht_cd: S300001
    line_num: 2700
    clmn_num: 200
    description: Grand total beds including subprovider, SNF, nursing facility, and hospice beds.

  - name: total_discharges
    source: nmrc
    type: int
    wksht_cd: S300001
    line_num: 100
    clmn_num: 1500
    description: Total inpatient discharges for adults, pediatrics, and specialty units.

  - name: total_bed_days_available
    source: nmrc
    type: int
    wksht_cd: S300001
    line_num: 100
    clmn_num: 300
    description: Total bed-days available during the reporting period.

  - name: inpatient_bed_days_utilized
    source: nmrc
    type: int
    wksht_cd: S300001
    line_num: 100
    clmn_num: 800
    description: Total inpatient bed-days utilized during the reporting period.

  # --- Revenue and expense (Worksheet G-3) ---

  - name: net_patient_revenue
    source: nmrc
    type: currency_usd
    wksht_cd: G300000
    line_num: 300
    clmn_num: 100
    description: Net patient revenue — total patient revenues minus allowances and discounts.

  - name: total_operating_expenses
    source: nmrc
    type: currency_usd
    wksht_cd: G300000
    line_num: 400
    clmn_num: 100
    description: Total operating expenses.

  - name: other_income
    source: nmrc
    type: currency_usd
    wksht_cd: G300000
    line_num: 2500
    clmn_num: 100
    description: Total other operating income.

  - name: total_other_expenses
    source: nmrc
    type: currency_usd
    wksht_cd: G300000
    line_num: 2800
    clmn_num: 100
    description: Total other expenses.

  # --- Uncompensated care (Worksheet S-10) ---

  - name: total_bad_debt
    source: nmrc
    type: currency_usd
    wksht_cd: S100001
    line_num: 2600
    clmn_num: 100
    description: Total bad debt expense reported on Worksheet S-10 (2010 format only).

  - name: charity_care_cost
    source: nmrc
    type: currency_usd
    wksht_cd: S100001
    line_num: 2300
    clmn_num: 300
    description: Cost of charity care reported on Worksheet S-10 (2010 format only).

  - name: uncompensated_care_cost
    source: nmrc
    type: currency_usd
    wksht_cd: S100001
    line_num: 3000
    clmn_num: 100
    description: Total cost of uncompensated care reported on Worksheet S-10 (2010 format only).

  # --- Charity care detail (Worksheet S-10) ---

  - name: charity_care_initial_charges
    source: nmrc
    type: currency_usd
    wksht_cd: S100001
    line_num: 2000
    clmn_num: 300
    description: Initial obligation-of-patients charges for charity care and uninsured discounts.

  - name: charity_care_cost_before_payments
    source: nmrc
    type: currency_usd
    wksht_cd: S100001
    line_num: 2100
    clmn_num: 300
    description: Cost of charity care and uninsured discounts before subtracting partial patient payments.

  - name: charity_care_partial_payments
    source: nmrc
    type: currency_usd
    wksht_cd: S100001
    line_num: 2200
    clmn_num: 300
    description: Partial payments received from patients approved for charity care.

  # --- Bad debt detail (Worksheet S-10) ---

  - name: medicare_bad_debt_reimbursable
    source: nmrc
    type: currency_usd
    wksht_cd: S100001
    line_num: 2700
    clmn_num: 100
    description: Portion of bad debt that is Medicare-reimbursable.

  - name: non_medicare_bad_debt_expense
    source: nmrc
    type: currency_usd
    wksht_cd: S100001
    line_num: 2800
    clmn_num: 100
    description: Non-Medicare bad debt expense (total bad debt minus Medicare-reimbursable portion).

  - name: non_medicare_bad_debt_cost
    source: nmrc
    type: currency_usd
    wksht_cd: S100001
    line_num: 2900
    clmn_num: 100
    description: Cost of non-Medicare bad debt after applying the cost-to-charge ratio.

  - name: cost_to_charge_ratio
    source: nmrc
    type: ratio
    wksht_cd: S100001
    line_num: 100
    clmn_num: 100
    description: Hospital-wide cost-to-charge ratio used to translate Worksheet S-10 charges into costs.

  # --- G-2 Part I inpatient revenue breakdown (column 100) ---

  - name: inpatient_revenue_hospital
    source: nmrc
    type: currency_usd
    wksht_cd: G200000
    line_num: 100
    clmn_num: 100
    description: Inpatient hospital revenue (acute-care component of the facility).

  - name: inpatient_revenue_general
    source: nmrc
    type: currency_usd
    wksht_cd: G200000
    line_num: 1000
    clmn_num: 100
    description: Inpatient general service revenue (hospital + IPF + IRF + SNF + subproviders).

  - name: inpatient_revenue_intensive_care
    source: nmrc
    type: currency_usd
    wksht_cd: G200000
    line_num: 1600
    clmn_num: 100
    description: Inpatient intensive-care-type revenue (ICU, CCU, burn, surgical IC, and others).

  - name: inpatient_revenue_routine
    source: nmrc
    type: currency_usd
    wksht_cd: G200000
    line_num: 1700
    clmn_num: 100
    description: Inpatient routine-care revenue (sum of general and intensive-care routine revenue).

  - name: inpatient_revenue_ancillary
    source: nmrc
    type: currency_usd
    wksht_cd: G200000
    line_num: 1800
    clmn_num: 100
    description: Inpatient ancillary services revenue.

  - name: inpatient_revenue_other
    source: nmrc
    type: currency_usd
    wksht_cd: G200000
    line_num: 1900
    clmn_num: 100
    description: Inpatient outpatient-services revenue (services rendered to inpatients through outpatient departments).

  - name: inpatient_total_revenue
    source: nmrc
    type: currency_usd
    wksht_cd: G200000
    line_num: 2800
    clmn_num: 100
    description: Inpatient total patient revenue across all service lines.

  # --- G-2 Part I outpatient revenue (column 200) ---

  - name: outpatient_revenue_ancillary
    source: nmrc
    type: currency_usd
    wksht_cd: G200000
    line_num: 1800
    clmn_num: 200
    description: Outpatient ancillary services revenue.

  - name: outpatient_revenue_other
    source: nmrc
    type: currency_usd
    wksht_cd: G200000
    line_num: 1900
    clmn_num: 200
    description: Outpatient outpatient-services revenue (non-ancillary outpatient visits).

  - name: outpatient_total_revenue
    source: nmrc
    type: currency_usd
    wksht_cd: G200000
    line_num: 2800
    clmn_num: 200
    description: Outpatient total patient revenue.

  - name: total_patient_revenue
    source: nmrc
    type: currency_usd
    wksht_cd: G200000
    line_num: 2800
    clmn_num: 300
    description: Grand total patient revenue (sum of inpatient and outpatient).

  # --- G-3 additional income lines ---

  - name: donations
    source: nmrc
    type: currency_usd
    wksht_cd: G300000
    line_num: 600
    clmn_num: 100
    description: Charitable donations reported on Worksheet G-3.

  - name: investment_income
    source: nmrc
    type: currency_usd
    wksht_cd: G300000
    line_num: 700
    clmn_num: 100
    description: Investment income reported on Worksheet G-3.

  # --- S-3 Part I special-care bed breakdown (column 200) ---

  - name: beds_adult_and_pediatric
    source: nmrc
    type: int
    wksht_cd: S300001
    line_num: 100
    clmn_num: 200
    description: Adult and pediatric beds (Worksheet S-3 Part I line 1).

  - name: icu_beds
    source: nmrc
    type: int
    wksht_cd: S300001
    line_num: 800
    line_num_end: 899
    clmn_num: 200
    aggregation: sum
    description: Total intensive-care-unit beds, summed across all ICU subcategory lines.

  - name: ccu_beds
    source: nmrc
    type: int
    wksht_cd: S300001
    line_num: 900
    line_num_end: 999
    clmn_num: 200
    aggregation: sum
    description: Total coronary-care-unit beds, summed across all CCU subcategory lines.

  - name: burn_icu_beds
    source: nmrc
    type: int
    wksht_cd: S300001
    line_num: 1000
    line_num_end: 1099
    clmn_num: 200
    aggregation: sum
    description: Total burn-intensive-care-unit beds.

  - name: surgical_icu_beds
    source: nmrc
    type: int
    wksht_cd: S300001
    line_num: 1100
    line_num_end: 1199
    clmn_num: 200
    aggregation: sum
    description: Total surgical-intensive-care-unit beds.

  - name: other_special_care_beds
    source: nmrc
    type: int
    wksht_cd: S300001
    line_num: 1200
    line_num_end: 1299
    clmn_num: 200
    aggregation: sum
    description: Total other special-care beds (NICU, pediatric ICU, trauma, etc.).

  # --- Medicare program cost and charges (Worksheets D-1 and D-3) ---

  - name: medicare_inpatient_operating_cost
    source: nmrc
    type: currency_usd
    wksht_cd: D10A181
    line_num: 5300
    clmn_num: 100
    description: Medicare inpatient program operating cost (Worksheet D-1 Part II).

  - name: medicare_inpatient_routine_charges
    source: nmrc
    type: currency_usd
    wksht_cd: D30A180
    line_num: 3000
    line_num_end: 3599
    clmn_num: 200
    aggregation: sum
    description: Medicare inpatient program routine service charges, summed across department lines.

  - name: medicare_inpatient_ancillary_net_charges
    source: nmrc
    type: currency_usd
    wksht_cd: D30A180
    line_num: 20200
    clmn_num: 200
    description: Medicare inpatient program ancillary service net charges (Worksheet D-3).
