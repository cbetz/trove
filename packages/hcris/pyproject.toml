[project]
name = "hcris"
version = "0.1.0"
description = "Parser for CMS Medicare Cost Reports (HCRIS) with semantic field dictionary."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Chris Betz" }]
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hcris"]
