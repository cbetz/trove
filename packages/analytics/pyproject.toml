[project]
name = "analytics"
version = "0.1.0"
description = "Composed analytical queries over HCRIS + Form 990 (peer compare, margin trends, community-benefit gap)."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Chris Betz" }]
dependencies = [
    "pandas>=2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/analytics"]
