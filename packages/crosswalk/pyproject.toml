[project]
name = "crosswalk"
version = "0.1.0"
description = "CCN ↔ EIN crosswalk for linking Medicare Cost Reports to IRS Form 990 filings."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Chris Betz" }]
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/crosswalk"]
