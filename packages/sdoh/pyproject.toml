[project]
name = "sdoh"
version = "0.1.0"
description = "Social Determinants of Health enrichments for trove (Area Deprivation Index, etc.)."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Chris Betz" }]
dependencies = [
    "pandas>=2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sdoh"]
